## Approach C: Hybrid Fusion (Pose + Video)
## Optimized for lowest possible loss on WLASL100.
## Hardware: RTX 4080 (16 GB VRAM)

approach: fusion
fusion: concat
fusion_dim: 256

# Sub-model configs
backbone: r2plus1d_18
pretrained: true
num_keypoints: 543

# Dataset
wlasl_variant: 100
# num_classes is auto-derived from wlasl_variant (100 -> 100, 300 -> 300, etc.)
T: 64
image_size: 224

# Pose Transformer settings (auto-scaled by __post_init__ for the variant)
d_model: 128
nhead: 4
num_layers: 2
dropout: 0.1

# Data loading
num_workers: 8

# Training
epochs: 250
batch_size: 8
lr: 1.0e-4
weight_decay: 5.0e-4
warmup_epochs: 10
label_smoothing: 0.0        # removed — was artificially flooring loss
grad_clip: 1.0
fp16: true
weighted_sampling: false
early_stopping_patience: 40
mixup_alpha: 0.1            # very light mixup

# Scheduler
scheduler: cosine

# Logging
use_wandb: false
use_tensorboard: true
log_interval: 10

# Inference
confidence_threshold: 0.6
smoothing_window: 5
buffer_size: 64
fps_display: true

# Paths
data_dir: data
output_dir: outputs
checkpoint_dir: checkpoints/fusion
log_dir: logs/fusion
