## Approach B: RGB Video Classifier
## Optimized for lowest possible loss on WLASL100.
## Hardware: RTX 4080 (16 GB VRAM)

approach: video
backbone: r2plus1d_18
pretrained: true
wlasl_variant: 100
# num_classes is auto-derived from wlasl_variant (100 -> 100, 300 -> 300, etc.)

# Temporal & spatial
T: 64
image_size: 224

# Model
dropout: 0.3                # video backbones need moderate dropout (not auto-scaled)

# Data loading
num_workers: 8

# Training
epochs: 250
batch_size: 8               # 3D CNNs need small batches
lr: 1.0e-4                  # lower LR for finetuning pretrained backbone
weight_decay: 5.0e-4
warmup_epochs: 10
label_smoothing: 0.0        # removed — was artificially flooring loss
grad_clip: 1.0
fp16: true                  # essential for video models
weighted_sampling: false
early_stopping_patience: 40

# Scheduler
scheduler: cosine

# Logging
use_wandb: false
use_tensorboard: true
log_interval: 10

# Inference
confidence_threshold: 0.6
smoothing_window: 5
buffer_size: 64
fps_display: true

# Paths
data_dir: data
output_dir: outputs
checkpoint_dir: checkpoints/video
log_dir: logs/video
