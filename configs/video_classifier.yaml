## Approach B: RGB Video Classifier
## Uses pretrained 3D CNN backbones (R(2+1)D, R3D, SlowFast, etc.)

approach: video
backbone: r2plus1d_18
pretrained: true
wlasl_variant: 100
num_classes: 100

# Temporal & spatial
T: 32
image_size: 224

# Model
dropout: 0.4

# Training
epochs: 100
batch_size: 16
lr: 1.0e-4
weight_decay: 1.0e-4
warmup_epochs: 10
label_smoothing: 0.1
grad_clip: 1.0
fp16: true
weighted_sampling: false
early_stopping_patience: 20

# Scheduler
scheduler: onecycle

# Logging
use_wandb: false
use_tensorboard: true
log_interval: 10

# Inference
confidence_threshold: 0.6
smoothing_window: 5
buffer_size: 32
fps_display: true

# Paths
data_dir: data
output_dir: outputs
checkpoint_dir: checkpoints
log_dir: logs
