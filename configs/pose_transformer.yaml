## Approach A: Pose/Keypoint Transformer
## This is the recommended starting configuration.
## Tuned for low-data scenarios (300-800 effective training samples).

approach: pose_transformer
wlasl_variant: 100
# num_classes is auto-derived from wlasl_variant (100 -> 100, 300 -> 300, etc.)
num_keypoints: 543

# Temporal
T: 64

# Features
use_motion: true  # Concatenate velocity (frame differences) with position

# Model architecture
d_model: 256
nhead: 8
num_layers: 4
dropout: 0.4

# Training — tuned for small datasets (~300-800 usable samples)
epochs: 100
batch_size: 16
lr: 5.0e-4
weight_decay: 1.0e-4
warmup_epochs: 10
label_smoothing: 0.15
grad_clip: 1.0
fp16: true
weighted_sampling: true
early_stopping_patience: 25
mixup_alpha: 0.2  # Mixup regularization (0 = disabled)

# Scheduler
scheduler: cosine

# Evaluation
use_tta: false  # Test-time augmentation (horizontal flip averaging)

# Logging
use_wandb: false
use_tensorboard: true
log_interval: 10

# Inference
confidence_threshold: 0.6
smoothing_window: 5
buffer_size: 64
fps_display: true

# Paths
data_dir: data
output_dir: outputs
checkpoint_dir: checkpoints
log_dir: logs
